<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Dev Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #111827;
      color: #e0e0e0;
      font-family: monospace;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 860px;
      margin: 0 auto;
    }

    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #1f2937;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.1rem;
      color: #a78bfa;
      letter-spacing: 0.05em;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .message {
      max-width: 78%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      line-height: 1.55;
    }

    .message pre {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: inherit;
    }

    .message.user {
      align-self: flex-end;
      background: #7c3aed;
      color: #fff;
      border-bottom-right-radius: 2px;
    }

    .message.ai {
      align-self: flex-start;
      background: #1f2937;
      color: #d1fae5;
      border-bottom-left-radius: 2px;
    }

    .message.loading {
      align-self: flex-start;
      background: #1f2937;
      color: #6b7280;
      font-style: italic;
    }

    .message.error {
      align-self: flex-start;
      background: #1f2937;
      color: #f87171;
    }

    .input-area {
      flex-shrink: 0;
      border-top: 1px solid #1f2937;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    select {
      width: fit-content;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .input-row {
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      padding: 0.7rem;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #1f2937;
      color: #e0e0e0;
      font-family: monospace;
      font-size: 0.85rem;
      resize: none;
      height: 80px;
      line-height: 1.4;
    }

    textarea:focus { outline: none; border-color: #7c3aed; }

    button {
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      border: none;
      background: #7c3aed;
      color: #fff;
      font-family: monospace;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
      align-self: flex-end;
    }

    button:hover { background: #6d28d9; }
    button:disabled { background: #374151; cursor: not-allowed; }

    .hint {
      font-size: 0.75rem;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>AI Dev Assistant</h1>
    </header>

    <div id="chat"></div>

    <div class="input-area">
      <select id="action">
        <option value="debug">debug</option>
        <option value="refactor">refactor</option>
        <option value="generate-feature">generate-feature</option>
        <option value="explain-code">explain-code</option>
      </select>
      <div class="input-row">
        <textarea id="input" placeholder="Paste your code or describe a feature..."></textarea>
        <button id="send-btn" onclick="sendMessage()">Send</button>
      </div>
      <span class="hint">Ctrl+Enter to send</span>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
